<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gradebook | ConnectUs</title>

    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'DM Sans', sans-serif; }

        /* ── Overall header ── */
        .gb-header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4338ca 100%);
            border-radius: 16px;
            padding: 28px 32px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: 0 8px 32px rgba(67,56,202,0.25);
            margin-bottom: 24px;
        }
        .gb-avg-circle {
            width: 88px; height: 88px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.25);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .gb-avg-num  { font-size: 28px; font-weight: 800; line-height: 1; }
        .gb-avg-unit { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 600; }
        .gb-meta     { flex: 1; }
        .gb-title    { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; margin: 0 0 4px; }
        .gb-sub      { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; margin: 0; }
        .gb-print-btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 18px; border-radius: 8px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 12.5px; font-weight: 700;
            cursor: pointer; transition: background 0.15s; font-family: inherit;
            white-space: nowrap;
        }
        .gb-print-btn:hover { background: rgba(255,255,255,0.25); }

        /* ── Subject card ── */
        .subj-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .subj-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; background: #0f172a; color: #fff;
        }
        .subj-icon {
            width: 38px; height: 38px; border-radius: 8px;
            background: rgba(255,255,255,0.12); display: flex;
            align-items: center; justify-content: center;
            font-size: 15px; font-weight: 800; flex-shrink: 0; margin-right: 14px;
        }
        .subj-name  { font-size: 16px; font-weight: 800; letter-spacing: -0.2px; }
        .subj-count { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500; margin-top: 2px; }
        .subj-avg-badge {
            display: flex; align-items: center; gap: 10px;
        }
        .subj-avg-num  { font-size: 22px; font-weight: 800; font-family: 'DM Mono', monospace; }
        .subj-ltr {
            font-size: 13px; font-weight: 800; padding: 3px 10px;
            border-radius: 6px; font-family: 'DM Mono', monospace;
        }

        /* ── Type row (collapsible) ── */
        .type-row-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 13px 22px; border-bottom: 1px solid #f1f5f9;
            cursor: pointer; user-select: none; transition: background 0.1s;
        }
        .type-row-header:hover { background: #f8fafc; }
        .type-row-header:last-child { border-bottom: none; }
        .type-pill {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.08em; padding: 3px 9px; border-radius: 99px;
            background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
            margin-right: 10px; white-space: nowrap;
        }
        .type-label  { font-size: 13.5px; font-weight: 700; color: #1e293b; }
        .type-weight { font-size: 11px; font-weight: 600; color: #94a3b8; margin-left: 6px; }
        .type-avg    { font-size: 13px; font-weight: 800; font-family: 'DM Mono', monospace; }
        .type-chevron { font-size: 11px; color: #94a3b8; transition: transform 0.2s; margin-left: 12px; }
        .type-body   { display: none; background: #f8fafc; border-top: 1px solid #f1f5f9; }
        .type-body.open { display: block; }

        /* ── Assignment row ── */
        .assign-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 11px 24px 11px 32px; border-bottom: 1px solid #f1f5f9;
            cursor: pointer; transition: background 0.1s;
        }
        .assign-row:hover { background: #f0f4ff; }
        .assign-row:last-child { border-bottom: none; }
        .assign-title  { font-size: 13px; font-weight: 700; color: #1e293b; }
        .assign-meta   { font-size: 11px; color: #94a3b8; font-weight: 500; margin-top: 2px; }
        .assign-score  { font-size: 13px; font-weight: 800; font-family: 'DM Mono', monospace; text-align: right; }
        .assign-pct    { font-size: 11px; font-weight: 600; color: #94a3b8; text-align: right; }
        .new-badge {
            display: inline-block; font-size: 9px; font-weight: 800;
            background: #4f46e5; color: #fff; padding: 1px 6px;
            border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em;
            margin-left: 6px; vertical-align: middle;
        }

        /* ── Rubric bar at bottom of subject card ── */
        .rubric-bar {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
            padding: 10px 22px; background: #f8fafc; border-top: 1px solid #f1f5f9;
        }
        .rubric-chip {
            font-size: 10px; font-weight: 700; padding: 2px 8px;
            border-radius: 99px; background: #e0e7ff; color: #3730a3;
            border: 1px solid #c7d2fe;
        }

        /* ── Modal ── */
        .modal-back { position:fixed;inset:0;background:rgba(15,23,42,0.65);backdrop-filter:blur(4px);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px; }
        .modal-back.hidden { display:none; }
        .modal-box  { background:#fff;border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,0.25);width:100%;max-width:500px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden; }
        .modal-stripe { height:4px; background:linear-gradient(90deg,#4f46e5,#7c3aed); flex-shrink:0; }
        .modal-hd   { padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0; }
        .modal-body { flex:1;overflow-y:auto;padding:24px; }
        .modal-close-btn {
            width:30px;height:30px;display:flex;align-items:center;justify-content:center;
            border-radius:8px;border:1px solid #e2e8f0;background:#fff;
            color:#94a3b8;cursor:pointer;transition:all 0.12s;font-size:13px;flex-shrink:0;
        }
        .modal-close-btn:hover { background:#fee2e2;border-color:#fecaca;color:#dc2626; }
        .detail-row {
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 0;border-bottom:1px solid #f8fafc;
        }
        .detail-row:last-child { border-bottom:none; }
        .detail-label { font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8; }
        .detail-val   { font-size:13.5px;font-weight:700;color:#1e293b; }

        /* ── Loader / empty ── */
        .loader-wrap { display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px; }
        .loader-wrap i { font-size:28px;color:#6366f1; }
        .loader-wrap p { font-size:13px;color:#94a3b8;font-weight:600;margin:0; }

        /* ── Print styles ── */
        @media print {
            body { background:#fff!important; }
            #layout-sidebar-container, #layout-topbar-container, .no-print { display:none!important; }
            #dashboardMain { display:block!important;height:auto!important;overflow:visible!important; }
            .flex-1.overflow-y-auto { overflow:visible!important; }
            .gb-print-btn { display:none!important; }
            .type-body { display:block!important; }
            .subj-card { break-inside:avoid;box-shadow:none!important; }
            .modal-back { display:none!important; }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-[#f5f7ff]">

    <div id="layout-sidebar-container" class="flex-shrink-0 z-20 h-full"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden">
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-7">
            <div class="max-w-4xl mx-auto">

                <!-- Overall header -->
                <div class="gb-header no-print" id="gbHeader" style="display:none;">
                    <div class="gb-avg-circle">
                        <span id="gbAvgNum" class="gb-avg-num">--</span>
                        <span class="gb-avg-unit">/ 100%</span>
                    </div>
                    <div class="gb-meta">
                        <p class="gb-title">My Gradebook</p>
                        <p class="gb-sub" id="gbTermLabel">Loading term…</p>
                        <p class="gb-sub" id="gbStandingLabel" style="margin-top:4px;font-weight:700;"></p>
                    </div>
                    <button class="gb-print-btn no-print" onclick="window.print()">
                        <i class="fa-solid fa-print"></i> Print Gradebook
                    </button>
                </div>

                <!-- Loader -->
                <div id="gradesLoader" class="loader-wrap">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>Loading your gradebook…</p>
                </div>

                <!-- Empty state -->
                <div id="noCurrentGradesMsg" class="hidden loader-wrap" style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;">
                    <i class="fa-solid fa-folder-open" style="color:#c7d2fe;"></i>
                    <p>No grades recorded for this period yet.</p>
                </div>

                <!-- Subject cards -->
                <div id="currentSubjectsContainer" class="space-y-5"></div>

            </div>
        </div>
    </main>

    <!-- Assignment detail modal -->
    <div id="assignmentModal" class="modal-back hidden">
        <div class="modal-box">
            <div class="modal-stripe"></div>
            <div class="modal-hd">
                <div>
                    <p id="mdSubject" style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#6366f1;margin:0 0 4px;"></p>
                    <h3 id="mdTitle" style="font-size:17px;font-weight:800;color:#1e293b;margin:0;"></h3>
                </div>
                <button class="modal-close-btn" onclick="window.closeAssignmentModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <!-- Score row -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
                    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;">
                        <span style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:6px;">Score</span>
                        <span id="mdScore" style="font-size:24px;font-weight:800;color:#1e293b;font-family:'DM Mono',monospace;"></span>
                    </div>
                    <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;text-align:center;">
                        <span style="display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#94a3b8;margin-bottom:6px;">Percentage</span>
                        <span id="mdPct" style="font-size:28px;font-weight:800;font-family:'DM Mono',monospace;"></span>
                    </div>
                </div>
                <!-- Progress bar -->
                <div style="height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-bottom:20px;">
                    <div id="mdBar" style="height:100%;border-radius:99px;transition:width 0.4s;"></div>
                </div>
                <!-- Details table -->
                <div style="border:1px solid #f1f5f9;border-radius:10px;overflow:hidden;margin-bottom:20px;">
                    <div class="detail-row" style="padding:10px 16px;border-bottom:1px solid #f8fafc;">
                        <span class="detail-label">Type</span><span id="mdType" class="detail-val"></span>
                    </div>
                    <div class="detail-row" style="padding:10px 16px;border-bottom:1px solid #f8fafc;">
                        <span class="detail-label">Category Weight</span><span id="mdWeight" class="detail-val"></span>
                    </div>
                    <div class="detail-row" style="padding:10px 16px;border-bottom:1px solid #f8fafc;">
                        <span class="detail-label">Date</span><span id="mdDate" class="detail-val"></span>
                    </div>
                    <div class="detail-row" style="padding:10px 16px;">
                        <span class="detail-label">Entered By</span><span id="mdTeacher" class="detail-val"></span>
                    </div>
                </div>
                <!-- Notes -->
                <div id="mdNotesWrap">
                    <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6366f1;margin:0 0 8px;">Teacher's Notes</p>
                    <div id="mdNotes" style="background:#eef2ff;border-left:3px solid #6366f1;padding:14px 16px;border-radius:0 8px 8px 0;font-size:13px;color:#1e293b;line-height:1.6;font-weight:500;white-space:pre-wrap;"></div>
                </div>
                <!-- Edit history -->
                <div id="mdHistoryWrap" class="hidden" style="margin-top:16px;">
                    <p style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#d97706;margin:0 0 8px;"><i class="fa-solid fa-clock-rotate-left mr-1"></i>Edit History</p>
                    <div id="mdHistory" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="grades.js"></script>
</body>
</html>
