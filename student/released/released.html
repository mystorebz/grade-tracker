<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Ended — ConnectUs</title>
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* Theme Variables based on Student Portal */
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --brand-blue: #2563eb;
            --brand-blue-hover: #1d4ed8;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .portal-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 24px;
            display: block;
        }

        .logo {
            height: 38px;
            object-fit: contain;
            margin-bottom: 32px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .icon-wrap {
            width: 64px; height: 64px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }

        .student-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .student-id {
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 24px 0;
        }

        .message {
            font-size: 14.5px;
            color: var(--text-secondary);
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .reason-badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 99px;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .contact-block {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 32px;
            text-align: center;
        }

        .contact-block p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .contact-block a {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s ease;
        }

        .contact-block a:hover { color: var(--brand-blue); }

        .clear-btn {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--brand-blue);
            color: #ffffff;
            border: none;
            font-family: 'DM Sans', sans-serif; 
            font-size: 14px; 
            font-weight: 700;
            padding: 14px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .clear-btn:hover { background: var(--brand-blue-hover); }
        .clear-btn:active { transform: scale(0.98); }
        .clear-btn:focus-visible { outline: 2px solid var(--brand-blue); outline-offset: 3px; }

        /* Legal Footer matching the ConnectUs standard */
        .legal-footer {
            margin-top: 40px;
            font-size: 12.5px;
            color: var(--text-secondary);
            font-weight: 500;
            text-align: center;
            line-height: 1.6;
        }
        
        .legal-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 600;
        }

        .legal-footer a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="card">
    <span class="portal-label">Student Portal</span>
    <img src="../../assets/images/logo2.png" alt="ConnectUs" class="logo" onerror="this.style.display='none'">

    <div class="icon-wrap" id="iconWrap"></div>

    <div class="student-name" id="studentName">Student</div>
    <div class="student-id"   id="studentId"></div>

    <span class="reason-badge" id="reasonBadge"></span>

    <hr class="divider">

    <p class="message" id="messageText"></p>

    <div class="contact-block">
        <p>If you need to request a copy of your records, please reach out directly.</p>
        <a href="mailto:info@connectusonline.org">
            <i class="fa-solid fa-envelope" aria-hidden="true" style="font-size:14px; color: var(--brand-blue);"></i>
            info@connectusonline.org
        </a>
    </div>

    <button class="clear-btn" onclick="handleClear()">
        Close & Clear Session <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
    </button>
</div>

<div class="legal-footer">
    &copy; 2026 ConnectUs. All rights reserved.<br>
    <a href="/terms.html">Terms of Service</a> &nbsp;&middot;&nbsp; <a href="/privacy.html">Privacy Policy</a>
</div>

<script>
function handleClear() {
    sessionStorage.removeItem('connectus_released');
    ['teacher', 'admin', 'student'].forEach(role => {
        localStorage.removeItem(`connectus_${role}_session`);
    });
    Object.keys(localStorage)
        .filter(k => k.startsWith('connectUs_') || k.startsWith('connectus_'))
        .forEach(k => localStorage.removeItem(k));
    window.location.replace('../login.html');
}

window.handleClear = handleClear;

let info = { studentName: '', studentId: '', reason: '' };
try {
    const raw = sessionStorage.getItem('connectus_released');
    if (raw) info = JSON.parse(raw);
} catch (_) {}

if (info.studentName) document.getElementById('studentName').textContent = info.studentName;
if (info.studentId) {
    // Adding the "ID:" prefix similar to the login page context
    document.getElementById('studentId').textContent = "ID: " + info.studentId;
}

const reason = (info.reason || '').toLowerCase();

let iconHtml    = '';
let badgeStyle  = '';
let badgeText   = '';
let messageText = '';

if (reason === 'graduated') {
    iconHtml    = '<i class="fa-solid fa-graduation-cap" aria-hidden="true" style="color:#0ea871;"></i>';
    document.getElementById('iconWrap').style.background = '#f0fdf4';
    document.getElementById('iconWrap').style.border     = '1px solid #bbf7d0';
    badgeStyle  = 'background:#f0fdf4;color:#15803d;border-color:#bbf7d0;';
    badgeText   = 'Graduated';
    messageText = 'Congratulations on completing your studies! Your enrollment is officially marked as complete.';

} else if (reason === 'transferred') {
    iconHtml    = '<i class="fa-solid fa-right-left" aria-hidden="true" style="color:#2563eb;"></i>';
    document.getElementById('iconWrap').style.background = '#eff6ff';
    document.getElementById('iconWrap').style.border     = '1px solid #bfdbfe';
    badgeStyle  = 'background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;';
    badgeText   = 'Transferred';
    messageText = 'Your enrollment at your previous school has successfully ended.';

} else {
    iconHtml    = '<i class="fa-solid fa-door-open" aria-hidden="true" style="color:#64748b;"></i>';
    document.getElementById('iconWrap').style.background = '#f8fafc';
    document.getElementById('iconWrap').style.border     = '1px solid #e2e8f0';
    badgeStyle  = 'background:#f8fafc;color:#475569;border-color:#e2e8f0;';
    badgeText   = 'Enrollment Ended';
    messageText = 'Your enrollment at this institution is no longer active.';
}

document.getElementById('iconWrap').innerHTML  = iconHtml;
document.getElementById('reasonBadge').style   = badgeStyle;
document.getElementById('reasonBadge').textContent = badgeText;
document.getElementById('messageText').textContent = messageText;
</script>
</body>
</html>
