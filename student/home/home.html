<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Dashboard | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/student.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="flex h-screen overflow-hidden bg-[#f5f3ff]">

    <div id="layout-sidebar-container" class="flex-shrink-0 z-20 h-full"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-7">
            <div id="view-overview" class="view-section max-w-5xl mx-auto">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                    <div class="stat-card bg-gradient-to-br from-indigo-600 to-indigo-800 p-6 rounded-3xl shadow-lg shadow-indigo-500/20 text-white border border-indigo-500/30 flex flex-col justify-between">
                        <div class="flex items-center justify-between mb-2">
                            <div class="bg-white/20 h-12 w-12 rounded-xl flex items-center justify-center text-xl"><i class="fa-solid fa-graduation-cap"></i></div>
                            <span class="text-indigo-200 text-[10px] font-black uppercase tracking-wider bg-black/10 px-3 py-1 rounded-full border border-white/10 shadow-inner">Current Avg</span>
                        </div>
                        <h3 class="text-5xl font-black mt-2 flex items-baseline gap-2"><span id="dashAvg">--</span><span class="text-2xl text-indigo-300 font-bold">%</span></h3>
                    </div>

                    <div class="stat-card bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-check-double"></i></div>
                            <div><h3 class="font-black text-slate-700">Assignments</h3><p class="text-xs text-slate-400 font-bold uppercase tracking-wider">This Period</p></div>
                        </div>
                        <h3 id="dashTotalGrades" class="text-4xl font-black text-slate-800">0</h3>
                    </div>

                    <div class="stat-card bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-bell"></i></div>
                            <div><h3 class="font-black text-slate-700">Recent Updates</h3><p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Last 7 Days</p></div>
                        </div>
                        <h3 id="dashRecentCount" class="text-4xl font-black text-slate-800">0</h3>
                    </div>
                </div>

                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex items-center gap-3">
                        <div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-sm"><i class="fa-solid fa-bolt"></i></div>
                        <h3 class="font-black text-slate-800 text-lg">Recent Activity Feed</h3>
                    </div>
                    <div class="p-6">
                        <div id="recentActivityList" class="space-y-4">
                            <div class="text-center py-8 text-slate-400 font-semibold">
                                <i class="fa-solid fa-spinner fa-spin text-2xl mb-3 block"></i>Loading activity...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="home.js"></script>
</body>
</html>
