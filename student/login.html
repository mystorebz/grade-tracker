<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Portal Login | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/student.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body id="loginScreen" class="min-h-screen flex flex-col items-center justify-center p-4 overflow-y-auto relative">

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div class="relative z-10 mb-5 w-full max-w-md">
        <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left text-xs"></i> Back to Main Site</a>
    </div>

    <div class="login-card relative z-10 bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-indigo-600 via-purple-500 to-indigo-500"></div>
        <div class="pt-8 pb-6 px-10 text-center border-b border-slate-100">
            <img src="../assets/images/logo.png" alt="ConnectUs" class="h-20 w-auto mx-auto mb-3">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Family Portal</h1>
            <p class="text-slate-500 text-sm mt-1 font-semibold">Track academic progress in real time</p>
        </div>
        
        <div class="p-8 space-y-5">
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2"><i class="fa-solid fa-school mr-1.5 text-indigo-400"></i>School ID</label>
                <input type="text" id="loginSchoolId" placeholder="e.g. LA1234" class="login-input">
            </div>
            <div>
                <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-2"><i class="fa-solid fa-key mr-1.5 text-indigo-400"></i>Student PIN</label>
                <input type="password" id="loginPin" placeholder="4-6 digit PIN" class="login-input text-center text-xl tracking-[0.4em] font-mono" maxlength="6">
            </div>
            <button id="loginBtn" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-black py-4 rounded-2xl transition shadow-lg shadow-indigo-500/30 text-base flex justify-center items-center gap-2">
                View Progress <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
            <p id="loginMsg" class="text-sm text-center font-bold hidden text-red-600 bg-red-50 p-3 rounded-xl border border-red-100"></p>
        </div>
        
        <div class="px-8 pb-7 text-center">
            <p class="text-xs text-slate-400 font-semibold">© 2026 ConnectUs</p>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
