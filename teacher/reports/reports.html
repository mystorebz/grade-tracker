<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Builder | Teacher Portal | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f0fdf8]">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-7 view-section">
            
            <div class="bg-white rounded-2xl shadow-sm border border-indigo-100 overflow-hidden mb-6 relative">
                <div class="h-1.5 bg-gradient-to-r from-indigo-500 via-purple-500 to-fuchsia-500"></div>
                
                <div class="p-6 border-b border-slate-100 flex items-center gap-3 bg-gradient-to-r from-indigo-50/50 to-white">
                    <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-chart-pie"></i></div>
                    <div>
                        <h3 class="font-black text-xl text-slate-800">Report Builder</h3>
                        <p class="text-sm text-slate-400 font-semibold">Design custom data queries for your classroom</p>
                    </div>
                </div>

                <div class="p-6 bg-slate-50/30">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                        
                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-calendar-days text-indigo-400"></i> Period</label>
                            <select id="rb-semester" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 shadow-sm cursor-pointer">
                                <option value="">Loading...</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-users-viewfinder text-indigo-400"></i> Scope</label>
                            <select id="rb-scope" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 shadow-sm cursor-pointer">
                                <option value="class">Whole Class</option>
                                <option value="student">Individual Student</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-layer-group text-indigo-400"></i> Subject</label>
                            <select id="rb-subject" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 shadow-sm cursor-pointer">
                                <option value="all">All Subjects</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-tags text-indigo-400"></i> Grade Type</label>
                            <select id="rb-type" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700 shadow-sm cursor-pointer">
                                <option value="all">All Types</option>
                            </select>
                        </div>
                        
                    </div>

                    <div id="studentFilterWrap" class="mt-5 hidden transition-all duration-300">
                        <label class="block text-[10px] font-black text-emerald-600 uppercase tracking-wider mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-user text-emerald-500"></i> Target Student</label>
                        <select id="rb-student" class="form-input w-full md:w-1/2 p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-sm font-bold text-emerald-800 shadow-sm cursor-pointer">
                            <option value="">— Select a Student —</option>
                        </select>
                    </div>

                    <div class="mt-6 flex items-center justify-between border-t border-slate-200 pt-5">
                        <p class="text-xs text-slate-400 font-semibold italic"><i class="fa-solid fa-circle-info mr-1"></i> Data reflects the current state of the database.</p>
                        <button id="generateReportBtn" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-black py-3 px-8 rounded-xl transition shadow-lg shadow-indigo-500/25 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Report
                        </button>
                    </div>
                </div>
            </div>

            <div id="reportResultsArea" class="hidden opacity-0 transition-opacity duration-500 space-y-6">
                
                <div class="flex flex-wrap gap-4 items-end justify-between bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <div>
                        <h2 id="reportOutputTitle" class="text-xl font-black text-slate-800 tracking-tight">Report Results</h2>
                        <p id="reportOutputMeta" class="text-xs font-black text-indigo-500 uppercase tracking-wider mt-1">Class · Math · Fall 2026</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="exportReportCSV()" class="no-print flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold px-4 py-2 rounded-xl text-sm transition border border-slate-200"><i class="fa-solid fa-file-csv"></i> Export CSV</button>
                        <button onclick="printReport()" class="no-print flex items-center gap-2 bg-indigo-50 hover:bg-indigo-600 hover:text-white text-indigo-700 font-bold px-4 py-2 rounded-xl text-sm transition border border-indigo-200 hover:border-indigo-600"><i class="fa-solid fa-print"></i> Print Official Report</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Average</p>
                        <div class="flex items-end gap-1"><span id="resAvg" class="text-3xl font-black text-slate-800">—</span></div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Highest</p>
                        <div class="flex items-end gap-1"><span id="resHigh" class="text-3xl font-black text-emerald-600">—</span></div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Lowest</p>
                        <div class="flex items-end gap-1"><span id="resLow" class="text-3xl font-black text-rose-500">—</span></div>
                    </div>
                    <div class="bg-white border border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center shadow-sm">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Total Grades</p>
                        <div class="flex items-end gap-1"><span id="resCount" class="text-3xl font-black text-indigo-600">—</span></div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-800 text-slate-200 text-xs uppercase tracking-wider">
                                <tr>
                                    <th class="px-6 py-4 font-black">Date</th>
                                    <th class="px-6 py-4 font-black">Student</th>
                                    <th class="px-6 py-4 font-black">Subject</th>
                                    <th class="px-6 py-4 font-black">Assignment</th>
                                    <th class="px-6 py-4 font-black">Type</th>
                                    <th class="px-6 py-4 font-black text-center">Score</th>
                                    <th class="px-6 py-4 font-black text-center">%</th>
                                </tr>
                            </thead>
                            <tbody id="reportTableBody" class="divide-y divide-slate-100">
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </main>

    <script type="module" src="reports.js"></script>
</body>
</html>
