<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Builder | Teacher Portal | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f4f7fb] font-['DM_Sans']">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden min-w-0">
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-8 view-section">
            <div class="max-w-6xl mx-auto space-y-6">
                
                <div class="flex items-end justify-between border-b-2 border-[#0d1f35] pb-4 mb-6">
                    <div>
                        <h1 class="text-xl font-bold text-[#0d1f35] tracking-tight mb-1">Data Query Builder</h1>
                        <p class="text-xs text-[#6b84a0] m-0">Generate advanced analytics and custom academic reports</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm border border-[#dce3ed] overflow-hidden relative">
                    <div class="h-[3px] bg-gradient-to-r from-[#2563eb] to-[#0ea871]"></div>
                    
                    <div class="p-5 border-b border-[#f0f4f8] flex items-center gap-3 bg-[#f8fafb]">
                        <div class="w-8 h-8 bg-[#eef4ff] text-[#2563eb] border border-[#c7d9fd] rounded flex items-center justify-center text-sm">
                            <i class="fa-solid fa-server"></i>
                        </div>
                        <div>
                            <h3 class="font-bold text-[14px] text-[#0d1f35] m-0">Configure Database Query</h3>
                        </div>
                    </div>

                    <div class="p-6 bg-white">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                            
                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-calendar-days text-[#2563eb]"></i> Period</label>
                                <select id="rb-semester" class="form-input w-full p-2.5 bg-white border border-[#dce3ed] rounded text-[13px] font-bold text-[#0d1f35] outline-none focus:border-[#2563eb] cursor-pointer">
                                    <option value="">Loading...</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-users-viewfinder text-[#2563eb]"></i> Scope</label>
                                <select id="rb-scope" class="form-input w-full p-2.5 bg-white border border-[#dce3ed] rounded text-[13px] font-bold text-[#0d1f35] outline-none focus:border-[#2563eb] cursor-pointer">
                                    <option value="class">Whole Class</option>
                                    <option value="student">Individual Student</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-layer-group text-[#2563eb]"></i> Subject</label>
                                <select id="rb-subject" class="form-input w-full p-2.5 bg-white border border-[#dce3ed] rounded text-[13px] font-bold text-[#0d1f35] outline-none focus:border-[#2563eb] cursor-pointer">
                                    <option value="all">All Subjects</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-tags text-[#2563eb]"></i> Grade Type</label>
                                <select id="rb-type" class="form-input w-full p-2.5 bg-white border border-[#dce3ed] rounded text-[13px] font-bold text-[#0d1f35] outline-none focus:border-[#2563eb] cursor-pointer">
                                    <option value="all">All Types</option>
                                </select>
                            </div>
                            
                        </div>

                        <div id="studentFilterWrap" class="mt-5 hidden transition-all duration-300">
                            <label class="block text-[10px] font-bold text-[#0ea871] uppercase tracking-widest mb-1.5 flex items-center gap-1.5"><i class="fa-solid fa-crosshairs text-[#0ea871]"></i> Target Student ID</label>
                            <select id="rb-student" class="form-input w-full md:w-1/2 p-2.5 bg-[#edfaf4] border border-[#c6f0db] rounded text-[13px] font-bold text-[#08754d] outline-none focus:border-[#0ea871] cursor-pointer">
                                <option value="">— Select a Student —</option>
                            </select>
                        </div>

                        <div class="mt-6 flex items-center justify-between border-t border-[#f0f4f8] pt-5">
                            <p class="text-[11px] text-[#9ab0c6] font-semibold italic m-0"><i class="fa-solid fa-server mr-1"></i> Connected to live database.</p>
                            <button id="generateReportBtn" class="bg-[#0d1f35] hover:bg-[#2563eb] text-white font-bold py-2.5 px-6 rounded transition flex items-center gap-2 text-[13px]">
                                <i class="fa-solid fa-play"></i> Execute Query
                            </button>
                        </div>
                    </div>
                </div>

                <div id="reportResultsArea" class="hidden opacity-0 transition-opacity duration-500 space-y-6">
                    
                    <div class="flex flex-wrap gap-4 items-end justify-between bg-white p-5 rounded-xl shadow-sm border border-[#dce3ed]">
                        <div>
                            <h2 id="reportOutputTitle" class="text-[16px] font-bold text-[#0d1f35] tracking-tight m-0">Report Results</h2>
                            <p id="reportOutputMeta" class="text-[10.5px] font-bold text-[#2563eb] uppercase tracking-widest mt-1.5 m-0">Class · Math · Fall 2026</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="exportReportCSV()" class="no-print flex items-center gap-2 bg-white hover:bg-[#f8fafb] text-[#374f6b] font-bold px-4 py-2 rounded border border-[#c5d0db] hover:border-[#0d1f35] transition text-[12px]">
                                <i class="fa-solid fa-file-csv"></i> Export Data
                            </button>
                            <button onclick="printReport()" class="no-print flex items-center gap-2 bg-[#eef4ff] hover:bg-[#c7d9fd] hover:border-[#2563eb] text-[#2563eb] font-bold px-4 py-2 rounded border border-[#c7d9fd] transition text-[12px]">
                                <i class="fa-solid fa-print"></i> Print Official Report
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white border border-[#dce3ed] rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <p class="text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 m-0">Average</p>
                            <div class="flex items-end gap-1 m-0"><span id="resAvg" class="text-2xl font-mono font-bold text-[#0d1f35] m-0">—</span></div>
                        </div>
                        <div class="bg-white border border-[#dce3ed] rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <p class="text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 m-0">Highest</p>
                            <div class="flex items-end gap-1 m-0"><span id="resHigh" class="text-2xl font-mono font-bold text-[#0ea871] m-0">—</span></div>
                        </div>
                        <div class="bg-white border border-[#dce3ed] rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <p class="text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 m-0">Lowest</p>
                            <div class="flex items-end gap-1 m-0"><span id="resLow" class="text-2xl font-mono font-bold text-[#e31b4a] m-0">—</span></div>
                        </div>
                        <div class="bg-white border border-[#dce3ed] rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <p class="text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5 m-0">Total Grades</p>
                            <div class="flex items-end gap-1 m-0"><span id="resCount" class="text-2xl font-mono font-bold text-[#2563eb] m-0">—</span></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-[#dce3ed] overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-[13px] text-[#374f6b]">
                                <thead class="bg-[#f8fafb] text-[#6b84a0] text-[10px] uppercase tracking-widest font-bold border-b-2 border-[#dce3ed]">
                                    <tr>
                                        <th class="px-6 py-3.5">Date</th>
                                        <th class="px-6 py-3.5">Student</th>
                                        <th class="px-6 py-3.5">Subject</th>
                                        <th class="px-6 py-3.5">Assignment</th>
                                        <th class="px-6 py-3.5">Type</th>
                                        <th class="px-6 py-3.5 text-center">Score</th>
                                        <th class="px-6 py-3.5 text-center">%</th>
                                    </tr>
                                </thead>
                                <tbody id="reportTableBody" class="divide-y divide-[#f0f4f8]">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>

    <script type="module" src="reports.js"></script>
</body>
</html>
