<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview | Teacher Portal | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f0fdf8]">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-7 view-section">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                <div class="stat-card bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs font-black uppercase tracking-wider mb-1">My Class</p>
                        <h3 id="stat-students" class="text-3xl font-black text-slate-800"><i class="fa-solid fa-spinner fa-spin text-sm text-slate-300"></i></h3>
                    </div>
                    <div class="h-12 w-12 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center text-xl"><i class="fa-solid fa-users"></i></div>
                </div>
                <div class="stat-card bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs font-black uppercase tracking-wider mb-1">Grades Logged</p>
                        <h3 id="stat-grades" class="text-3xl font-black text-slate-800"><i class="fa-solid fa-spinner fa-spin text-sm text-slate-300"></i></h3>
                    </div>
                    <div class="h-12 w-12 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center text-xl"><i class="fa-solid fa-award"></i></div>
                </div>
                <div class="stat-card bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-between">
                    <div>
                        <p class="text-slate-400 text-xs font-black uppercase tracking-wider mb-1">Needs Attention</p>
                        <h3 id="stat-risk" class="text-3xl font-black text-slate-800"><i class="fa-solid fa-spinner fa-spin text-sm text-slate-300"></i></h3>
                    </div>
                    <div class="h-12 w-12 rounded-xl bg-rose-100 text-rose-600 flex items-center justify-center text-xl"><i class="fa-solid fa-triangle-exclamation"></i></div>
                </div>
            </div>

            <div id="atRiskBanner" class="hidden mb-6 bg-rose-50 border border-rose-200 rounded-2xl p-4 flex items-center gap-3">
                <div class="w-9 h-9 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <p id="atRiskMsg" class="font-bold text-rose-700 text-sm"></p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="lg:col-span-2 space-y-5">
                    
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
                        <div class="flex items-center gap-2 mb-4">
                            <div class="w-7 h-7 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-bolt"></i></div>
                            <h3 class="font-black text-slate-700 text-sm uppercase tracking-wider">Quick Actions</h3>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                            <a href="../roster/roster.html" class="qa-btn bg-emerald-50 hover:bg-emerald-600 text-emerald-700 hover:text-white border-2 border-emerald-100 hover:border-emerald-600">
                                <div class="qa-icon bg-emerald-100"><i class="fa-solid fa-user-plus text-emerald-600"></i></div>
                                <div><p class="font-black text-sm">Add Student</p></div>
                            </a>
                            <a href="../grade_form/grade_form.html" class="qa-btn bg-blue-50 hover:bg-blue-600 text-blue-700 hover:text-white border-2 border-blue-100 hover:border-blue-600">
                                <div class="qa-icon bg-blue-100"><i class="fa-solid fa-plus-circle text-blue-600"></i></div>
                                <div><p class="font-black text-sm">Enter Grade</p></div>
                            </a>
                            <a href="../subjects/subjects.html" class="qa-btn bg-teal-50 hover:bg-teal-600 text-teal-700 hover:text-white border-2 border-teal-100 hover:border-teal-600">
                                <div class="qa-icon bg-teal-100"><i class="fa-solid fa-layer-group text-teal-600"></i></div>
                                <div><p class="font-black text-sm">Subjects</p></div>
                            </a>
                            <a href="../gradebook/gradebook.html" class="qa-btn bg-slate-50 hover:bg-slate-700 text-slate-700 hover:text-white border-2 border-slate-200 hover:border-slate-700">
                                <div class="qa-icon bg-slate-100"><i class="fa-solid fa-book text-slate-600"></i></div>
                                <div><p class="font-black text-sm">Gradebook</p></div>
                            </a>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col" style="height:320px">
                        <div class="p-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                            <h4 class="font-black text-slate-700 text-sm uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-slate-400 text-xs"></i> Recent Activity</h4>
                            <a href="../gradebook/gradebook.html" class="text-[10px] font-black text-emerald-600 hover:underline uppercase tracking-wider">View All</a>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2" id="recentActivityList">
                            <div class="flex items-center justify-center h-full text-slate-400 italic text-sm">
                                <i class="fa-solid fa-spinner fa-spin mr-2 text-emerald-400"></i> Loading activity...
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl border border-rose-200 shadow-sm overflow-hidden flex flex-col" style="height:100%;min-height:320px">
                        <div class="p-4 border-b border-rose-100 bg-rose-50/50">
                            <h4 class="font-black text-rose-700 text-sm uppercase tracking-wider flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation text-xs"></i> Needs Attention</h4>
                            <p class="text-xs text-rose-500 font-semibold mt-0.5">Students averaging below 65%</p>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 space-y-2 bg-rose-50/20" id="needsAttentionList">
                            <div class="flex items-center justify-center h-full text-slate-400 italic text-sm">
                                <i class="fa-solid fa-spinner fa-spin mr-2 text-rose-400"></i> Evaluating...
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="home.js"></script>
</body>
</html>
