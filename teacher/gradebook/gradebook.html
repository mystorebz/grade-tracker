<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradebook | Teacher Portal | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f0fdf8]">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-7 view-section">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 bg-gradient-to-r from-white to-slate-50/60">
                    <div class="flex flex-wrap gap-4 justify-between items-start mb-5">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-slate-800 text-white rounded-xl flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-book-open"></i></div>
                            <div>
                                <h3 class="font-black text-xl text-slate-800">Class Gradebook</h3>
                                <p class="text-sm text-slate-400 font-semibold">Complete grade record for the selected period</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 flex-wrap">
                            <button onclick="exportGradebookCSV()" class="no-print flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold px-4 py-2 rounded-xl text-sm transition border border-slate-200"><i class="fa-solid fa-download"></i> Export CSV</button>
                            <button onclick="printGradebook()" class="no-print flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold px-4 py-2 rounded-xl text-sm transition border border-slate-200"><i class="fa-solid fa-print"></i> Print</button>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap gap-3">
                        <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm flex-1 min-w-[200px]">
                            <i class="fa-solid fa-search text-slate-400 text-xs"></i>
                            <input type="text" id="gbSearchInput" oninput="applyGradebookFilters()" placeholder="Search assignment title..." class="bg-transparent text-sm font-bold text-slate-700 outline-none w-full">
                        </div>
                        <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm">
                            <i class="fa-solid fa-user text-slate-400 text-xs"></i>
                            <select id="gbFilterStudent" onchange="applyGradebookFilters()" class="bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer"><option value="">All Students</option></select>
                        </div>
                        <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm">
                            <i class="fa-solid fa-book text-slate-400 text-xs"></i>
                            <select id="gbFilterSubject" onchange="applyGradebookFilters()" class="bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer"><option value="">All Subjects</option></select>
                        </div>
                        <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-xl px-3 py-2 shadow-sm">
                            <i class="fa-solid fa-tag text-slate-400 text-xs"></i>
                            <select id="gbFilterType" onchange="applyGradebookFilters()" class="bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer"><option value="">All Types</option></select>
                        </div>
                        <div id="gbRecordCount" class="flex items-center bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2">
                            <span class="text-xs font-black text-emerald-700">— records</span>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800 text-slate-200 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4 font-black">Student</th>
                                <th class="px-6 py-4 font-black">Subject</th>
                                <th class="px-6 py-4 font-black">Assignment</th>
                                <th class="px-6 py-4 font-black">Type</th>
                                <th class="px-6 py-4 font-black text-center">Score</th>
                                <th class="px-6 py-4 font-black text-center">Grade</th>
                                <th class="px-6 py-4 font-black text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="gradebookTableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="assignmentModal" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full m-4 overflow-hidden transform scale-95 transition-transform duration-200" id="assignmentModalInner">
            <div class="h-1 bg-gradient-to-r from-emerald-500 to-teal-400"></div>
            <div class="px-7 py-5 border-b border-slate-100 flex justify-between items-center">
                <h3 id="aModalTitle" class="font-black text-xl text-slate-800">Assignment Detail</h3>
                <button onclick="closeAssignmentModal()" class="text-slate-400 hover:text-red-500 h-8 w-8 rounded-full flex items-center justify-center hover:bg-red-50 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-7" id="aModalBody"></div>
        </div>
    </div>

    <div id="editGradeModal" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full m-4 overflow-hidden transform scale-95 transition-transform duration-200" style="max-height:90vh;overflow-y:auto;" id="editGradeModalInner">
            <div class="h-1 bg-gradient-to-r from-amber-400 to-orange-500 flex-shrink-0"></div>
            <div class="px-7 py-5 border-b border-amber-100 flex justify-between items-center bg-amber-50/50 flex-shrink-0">
                <div>
                    <h3 class="font-black text-xl text-slate-800 flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-amber-600"></i> Edit Grade</h3>
                    <p id="editGradeContext" class="text-xs text-slate-500 font-semibold mt-0.5"></p>
                </div>
                <button onclick="closeEditGradeModal()" class="text-slate-400 hover:text-red-500 h-8 w-8 rounded-full flex items-center justify-center hover:bg-red-50 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-7 space-y-5">
                <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 shadow-sm">
                    <h4 class="text-xs font-black text-slate-600 uppercase tracking-wider mb-3 flex items-center gap-2"><i class="fa-solid fa-hashtag text-slate-500"></i> Change Score <span class="text-[10px] font-semibold normal-case text-slate-400">— reason required if changed</span></h4>
                    <div class="grid grid-cols-2 gap-4 mb-3">
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1.5">New Score</label>
                            <input type="number" id="ed-score" oninput="checkScoreChange()" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-xl font-black text-emerald-700 text-center shadow-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1.5">Out of (Max)</label>
                            <input type="number" id="ed-max" oninput="checkScoreChange()" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-xl font-bold text-slate-600 text-center shadow-sm">
                        </div>
                    </div>
                    <div id="reasonSection" class="reason-section">
                        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 shadow-inner">
                            <label class="block text-xs font-black text-amber-800 uppercase tracking-wider mb-2 flex items-center gap-1.5"><i class="fa-solid fa-triangle-exclamation text-amber-600"></i> Reason for Change <span class="bg-red-500 text-white px-2 py-0.5 rounded text-[10px] font-black ml-1">REQUIRED</span></label>
                            <textarea id="ed-reason" placeholder="e.g. Re-graded missed question. Corrected data entry error." class="form-input w-full p-3 bg-white border border-amber-300 rounded-xl text-sm h-20 resize-none shadow-sm"></textarea>
                            <p class="text-[11px] text-amber-700 mt-2 font-semibold flex items-center gap-1.5"><i class="fa-solid fa-clock-rotate-left"></i> Permanently timestamped and visible to parents.</p>
                        </div>
                    </div>
                </div>
                <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-5 shadow-sm">
                    <h4 class="text-xs font-black text-blue-700 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left text-blue-500"></i> Previous Notes</h4>
                    <div id="ed-old-notes" class="text-sm text-slate-700 bg-white p-3 rounded-xl border border-blue-200 max-h-32 overflow-y-auto whitespace-pre-wrap font-semibold mb-4 shadow-inner"></div>
                    
                    <h4 class="text-xs font-black text-blue-700 uppercase tracking-wider mb-2 flex items-center gap-2"><i class="fa-solid fa-note-sticky text-blue-500"></i> Append New Note</h4>
                    <textarea id="ed-new-notes" placeholder="Add additional feedback visible to student and parent..." class="form-input w-full p-3 bg-white border border-blue-200 rounded-xl text-sm h-20 resize-none shadow-sm"></textarea>
                </div>
                <button id="updateGradeBtn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white font-black py-4 rounded-xl transition shadow-lg shadow-amber-500/25 text-base flex justify-center items-center gap-2"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
                <p id="editGradeMsg" class="text-sm hidden font-bold p-3 rounded-xl text-center"></p>
            </div>
        </div>
    </div>

    <script type="module" src="gradebook.js"></script>
</body>
</html>
