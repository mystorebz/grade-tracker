<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Grade · ConnectUs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body { background: #f0fdf8; font-family: 'DM Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; margin: 0; }
        #dashboardMain { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 30px; }
        
        .field-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #6b84a0; margin-bottom: 6px; }
        .form-input { width: 100%; padding: 12px 14px; background: #fff; border: 1px solid #c5d0db; border-radius: 6px; font-size: 14px; color: #0d1f35; font-family: inherit; font-weight: 500; outline: none; transition: all 0.15s; box-sizing: border-box; }
        .form-input:focus { border-color: #0ea871; box-shadow: 0 0 0 3px rgba(14,168,113,0.15); }
        .form-input::placeholder { color: #9ab0c6; font-weight: 400; }
        
        /* Datalist Arrow Styling tweaks */
        input::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; transition: opacity 0.15s; }
        input::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="layout-sidebar-container" style="flex-shrink:0;height:100%;z-index:20;"></div>

    <main id="dashboardMain">
        <div id="layout-topbar-container" style="flex-shrink:0;z-index:10;"></div>

        <div class="scroll-area">
            <div class="max-w-3xl mx-auto">
                
                <div class="border-b-2 border-[#0d1f35] pb-4 mb-8">
                    <h1 class="text-2xl font-bold text-[#0d1f35] tracking-tight mb-1">Enter Grade</h1>
                    <p class="text-sm text-[#6b84a0]">Log a new assignment or exam into the student's formal record.</p>
                </div>

                <div class="bg-white border border-[#c5d0db] rounded-xl p-6 shadow-sm mb-6 relative">
                    <div class="absolute top-0 left-0 w-1 h-full bg-[#0d1f35] rounded-l-xl"></div>
                    
                    <h2 class="text-sm font-black uppercase tracking-wider text-[#0d1f35] mb-4">1. Select Student</h2>
                    
                    <label class="field-label">Student Search</label>
                    <div class="flex gap-3">
                        <input type="text" id="lookupInput" list="rosterList" class="form-input flex-1" placeholder="Type a name, ID, or click the arrow..." autocomplete="off">
                        <datalist id="rosterList"></datalist>
                        
                        <button onclick="window.resetLookup()" class="px-5 py-3 bg-slate-100 hover:bg-slate-200 border border-slate-300 text-slate-600 rounded-lg font-bold text-sm transition">
                            Clear
                        </button>
                    </div>
                    <p id="lookupMsg" class="hidden text-sm font-bold text-red-600 mt-3"></p>

                    <div id="studentBadge" class="hidden mt-5 bg-[#f8fafb] border border-[#dce3ed] rounded-lg p-4 flex items-center gap-4">
                        <div class="w-12 h-12 bg-[#0ea871] text-white rounded-lg flex items-center justify-center font-black text-xl shadow-inner" id="badgeInitial">?</div>
                        <div class="flex-1">
                            <p class="font-bold text-[#0d1f35] text-lg leading-tight" id="badgeName">Student Name</p>
                            <p class="text-xs font-semibold text-[#6b84a0]" id="badgeMeta">Class Info</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold uppercase tracking-wider text-[#9ab0c6] mb-0.5">Global ID</p>
                            <p class="font-mono font-bold text-[#0d1f35] bg-white border border-[#dce3ed] px-3 py-1 rounded" id="badgeId">S00-00000</p>
                        </div>
                    </div>
                </div>

                <div id="gradeFormSection" class="hidden bg-white border border-[#c5d0db] rounded-xl p-6 shadow-sm">
                    <div class="absolute top-0 left-0 w-1 h-full bg-[#0ea871] rounded-l-xl hidden"></div>
                    
                    <div class="flex justify-between items-end mb-6">
                        <h2 class="text-sm font-black uppercase tracking-wider text-[#0d1f35]">2. Assignment Details</h2>
                        
                        <div class="w-48">
                            <select id="agSemester" class="form-input py-2 text-sm bg-slate-50"></select>
                        </div>
                    </div>

                    <div id="gradeSavedBanner" class="hidden mb-6 bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-lg flex items-center gap-3">
                        <i class="fa-solid fa-circle-check text-xl"></i>
                        <div>
                            <p class="font-bold text-sm">Grade successfully recorded!</p>
                            <p class="text-xs opacity-80">You can enter another assignment for this student below.</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5 mb-5">
                        <div>
                            <label class="field-label">Subject</label>
                            <input type="text" id="agSubject" list="subjectList" class="form-input" placeholder="Type or select subject..." autocomplete="off">
                            <datalist id="subjectList"></datalist>
                        </div>
                        <div>
                            <label class="field-label">Date</label>
                            <input type="date" id="agDate" class="form-input">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5 mb-6">
                        <div>
                            <label class="field-label">Grade Type</label>
                            <select id="agType" class="form-input"></select>
                            <p id="typeWeightHint" class="text-xs font-semibold text-teal-600 mt-2 hidden bg-teal-50 border border-teal-100 px-2 py-1 rounded w-max"></p>
                        </div>
                        <div>
                            <label class="field-label">Assignment Title</label>
                            <input type="text" id="agTitle" class="form-input" placeholder="e.g. Chapter 4 Quiz">
                        </div>
                    </div>

                    <div class="border-t border-[#e8edf2] pt-6 mb-6 flex gap-8">
                        <div class="flex-1">
                            <label class="field-label">Scoring</label>
                            <div class="flex items-center gap-3">
                                <input type="number" id="agScore" class="form-input font-mono text-lg text-center" placeholder="0" min="0" step="0.5">
                                <span class="text-[#9ab0c6] font-black text-xl">/</span>
                                <input type="number" id="agMax" class="form-input font-mono text-lg text-center" value="100" min="1">
                            </div>
                        </div>

                        <div id="gradePreview" class="hidden flex-1 bg-[#f8fafb] border border-[#dce3ed] rounded-lg p-4 flex flex-col items-center justify-center">
                            <div class="flex items-center gap-3 mb-1">
                                <span id="prevPct" class="text-3xl font-black font-mono"></span>
                                <span id="prevLetter" class="text-xl font-black px-4 py-1.5 rounded-lg border"></span>
                            </div>
                            <span id="prevLabel" class="text-xs font-bold uppercase tracking-widest mt-1"></span>
                        </div>
                    </div>

                    <div class="mb-8">
                        <label class="field-label">Teacher Notes (Optional)</label>
                        <textarea id="agNotes" class="form-input resize-none" rows="3" placeholder="Private notes regarding this assignment..."></textarea>
                    </div>

                    <p id="gradeMsg" class="hidden"></p>

                    <div class="flex justify-end gap-3 pt-4 border-t border-[#e8edf2]">
                        <button onclick="window.resetLookup()" class="px-6 py-3 bg-white border border-[#c5d0db] hover:bg-slate-50 text-[#374f6b] rounded-lg font-bold text-sm transition">Cancel</button>
                        <button id="saveGradeBtn" class="px-8 py-3 bg-[#0ea871] hover:bg-[#0b8f5e] text-white rounded-lg font-bold text-sm shadow-md transition flex items-center">
                            <i class="fa-solid fa-database mr-2 text-xs"></i>Commit Grade Record
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="grade_form.js"></script>
</body>
</html>
