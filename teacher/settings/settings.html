<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Teacher Portal | ConnectUs</title>

    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f4f7fb] font-['DM_Sans']">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden min-w-0">
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-2xl mx-auto space-y-6">

                <!-- ── Profile ────────────────────────────────────────── -->
                <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] overflow-hidden">
                    <div class="h-[2px] bg-[#0ea871] w-full"></div>
                    <div class="p-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex items-center gap-3">
                        <div class="w-7 h-7 bg-[#edfaf4] text-[#0ea871] border border-[#c6f0db] rounded-sm flex items-center justify-center">
                            <i class="fa-solid fa-user text-[11px]"></i>
                        </div>
                        <h3 class="text-[12px] font-bold text-[#0d1f35] uppercase tracking-widest">Profile</h3>
                    </div>
                    <div class="p-6 space-y-4">
                        <!-- Avatar + name display -->
                        <div class="flex items-center gap-4 mb-2">
                            <div id="profileAvatar" class="w-14 h-14 bg-[#0d1f35] text-white rounded-sm flex items-center justify-center font-black text-2xl flex-shrink-0">T</div>
                            <div>
                                <p id="profileDisplayName" class="font-black text-[#0d1f35] text-lg"></p>
                                <p class="text-[11px] font-mono text-[#9ab0c6] mt-0.5" id="profileSchoolId"></p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Full Name *</label>
                                <input type="text" id="settingName"
                                    class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#0ea871] transition">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Email Address *</label>
                                <input type="email" id="settingEmail"
                                    class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#0ea871] transition">
                                <p class="text-[10px] text-[#9ab0c6] font-semibold mt-1">Used for PIN recovery</p>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Phone</label>
                                <input type="tel" id="settingPhone"
                                    class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#0ea871] transition">
                            </div>
                        </div>

                        <div class="flex items-center gap-3 pt-2">
                            <button id="saveProfileBtn"
                                class="bg-[#0d1f35] hover:bg-[#0ea871] text-white font-bold px-5 py-2.5 rounded-sm text-[12px] uppercase tracking-widest transition">
                                Save Profile
                            </button>
                            <p id="profileMsg" class="text-[12px] font-bold hidden"></p>
                        </div>
                    </div>
                </div>

                <!-- ── Change PIN ──────────────────────────────────────── -->
                <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] overflow-hidden">
                    <div class="h-[2px] bg-[#2563eb] w-full"></div>
                    <div class="p-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex items-center gap-3">
                        <div class="w-7 h-7 bg-[#eef4ff] text-[#2563eb] border border-[#c7d9fd] rounded-sm flex items-center justify-center">
                            <i class="fa-solid fa-lock text-[11px]"></i>
                        </div>
                        <h3 class="text-[12px] font-bold text-[#0d1f35] uppercase tracking-widest">Change PIN</h3>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Current PIN</label>
                            <input type="password" id="currentPin" placeholder="Your current login PIN"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#2563eb] transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">New PIN</label>
                            <input type="password" id="newPin" placeholder="Min. 6 characters"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#2563eb] transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Confirm New PIN</label>
                            <input type="password" id="confirmPin" placeholder="Type it again"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#2563eb] transition">
                        </div>
                        <div class="flex items-center gap-4 pt-1">
                            <button id="savePinBtn"
                                class="bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-bold px-5 py-2.5 rounded-sm text-[12px] uppercase tracking-widest transition">
                                Update PIN
                            </button>
                            <a href="../../onboarding/forgot-pin.html"
                                class="text-[11px] font-bold text-[#6b84a0] hover:text-[#2563eb] transition">
                                <i class="fa-solid fa-key mr-1"></i>Forgot current PIN?
                            </a>
                        </div>
                        <p id="pinMsg" class="text-[12px] font-bold hidden p-2.5 rounded-sm"></p>
                    </div>
                </div>

                <!-- ── Security Questions ──────────────────────────────── -->
                <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] overflow-hidden">
                    <div class="h-[2px] bg-[#f59e0b] w-full"></div>
                    <div class="p-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex items-center gap-3">
                        <div class="w-7 h-7 bg-[#fffbeb] text-[#d97706] border border-[#fde68a] rounded-sm flex items-center justify-center">
                            <i class="fa-solid fa-shield-halved text-[11px]"></i>
                        </div>
                        <div>
                            <h3 class="text-[12px] font-bold text-[#0d1f35] uppercase tracking-widest">Security Questions</h3>
                            <p class="text-[10px] text-[#9ab0c6] font-semibold">Used to verify your identity during PIN recovery</p>
                        </div>
                        <span id="secQBadge" class="ml-auto text-[10px] font-black px-2.5 py-1 rounded-sm uppercase tracking-wider bg-amber-100 text-amber-700 border border-amber-200">
                            Loading...
                        </span>
                    </div>
                    <div class="p-6 space-y-4">
                        <p class="text-[12px] text-[#6b84a0] font-semibold bg-[#f8fafb] border border-[#dce3ed] rounded-sm p-3">
                            <i class="fa-solid fa-circle-info text-[#9ab0c6] mr-2"></i>
                            Changing your security questions requires your current PIN to confirm your identity.
                        </p>

                        <div>
                            <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Current PIN (required to change questions)</label>
                            <input type="password" id="secQCurrentPin" placeholder="Enter your current PIN"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition">
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Security Question 1 *</label>
                            <select id="secQ1"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition mb-2">
                                <option value="">Select a question...</option>
                                <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                                <option value="What city were you born in?">What city were you born in?</option>
                                <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                                <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                                <option value="What is the name of the street you grew up on?">What is the name of the street you grew up on?</option>
                                <option value="What was your childhood nickname?">What was your childhood nickname?</option>
                                <option value="What is your oldest sibling's middle name?">What is your oldest sibling's middle name?</option>
                                <option value="What was the make of your first car?">What was the make of your first car?</option>
                                <option value="In what village or town did your parents meet?">In what village or town did your parents meet?</option>
                                <option value="What is the name of your favourite teacher?">What is the name of your favourite teacher?</option>
                            </select>
                            <input type="text" id="secA1" placeholder="Your answer (not case-sensitive)"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition">
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Security Question 2 *</label>
                            <select id="secQ2"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition mb-2">
                                <option value="">Select a question...</option>
                                <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                                <option value="What city were you born in?">What city were you born in?</option>
                                <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                                <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                                <option value="What is the name of the street you grew up on?">What is the name of the street you grew up on?</option>
                                <option value="What was your childhood nickname?">What was your childhood nickname?</option>
                                <option value="What is your oldest sibling's middle name?">What is your oldest sibling's middle name?</option>
                                <option value="What was the make of your first car?">What was the make of your first car?</option>
                                <option value="In what village or town did your parents meet?">In what village or town did your parents meet?</option>
                                <option value="What is the name of your favourite teacher?">What is the name of your favourite teacher?</option>
                            </select>
                            <input type="text" id="secA2" placeholder="Your answer (not case-sensitive)"
                                class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition">
                        </div>

                        <div class="flex items-center gap-3 pt-1">
                            <button id="saveSecQBtn"
                                class="bg-[#d97706] hover:bg-[#b45309] text-white font-bold px-5 py-2.5 rounded-sm text-[12px] uppercase tracking-widest transition">
                                Save Security Questions
                            </button>
                        </div>
                        <p id="secQMsg" class="text-[12px] font-bold hidden p-2.5 rounded-sm"></p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module" src="settings.js"></script>
</body>
</html>
