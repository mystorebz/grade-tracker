<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Teacher Portal | ConnectUs</title>

    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f4f7fb] font-['DM_Sans']">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main class="flex-1 flex flex-col h-full overflow-hidden min-w-0">
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-[1400px] mx-auto space-y-6">

                <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] p-6 flex items-center gap-4">
                    <div id="profileAvatar" class="w-14 h-14 bg-[#0d1f35] text-white rounded-sm flex items-center justify-center font-black text-2xl flex-shrink-0">T</div>
                    <div>
                        <p id="profileDisplayName" class="font-black text-[#0d1f35] text-xl tracking-tight">Loading...</p>
                        <p class="text-[11px] font-mono text-[#9ab0c6] mt-0.5" id="profileSchoolId">SCH-ID</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8 items-start">
                    
                    <div class="space-y-6">
                        <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] overflow-hidden">
                            <div class="h-[3px] bg-[#3b82f6] w-full"></div>
                            <div class="p-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex items-center gap-3">
                                <div class="w-7 h-7 bg-[#eef4ff] text-[#3b82f6] border border-[#c7d9fd] rounded-sm flex items-center justify-center">
                                    <i class="fa-solid fa-user text-[11px]"></i>
                                </div>
                                <h3 class="text-[12px] font-bold text-[#0d1f35] uppercase tracking-widest">Profile</h3>
                            </div>
                            <div class="p-6 space-y-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Full Name *</label>
                                    <input type="text" id="settingName" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#3b82f6] transition">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Email Address *</label>
                                    <input type="email" id="settingEmail" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#3b82f6] transition">
                                    <p class="text-[10px] text-[#9ab0c6] font-semibold mt-1">Used for PIN recovery</p>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Phone</label>
                                    <input type="tel" id="settingPhone" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#3b82f6] transition">
                                </div>
                                <div class="pt-2">
                                    <button id="saveProfileBtn" class="w-full bg-[#f8fafb] border border-[#dce3ed] hover:border-[#3b82f6] text-[#0d1f35] font-bold py-2.5 rounded-sm transition text-[12px] uppercase tracking-widest">
                                        Save Profile
                                    </button>
                                </div>
                                <p id="profileMsg" class="text-[12px] font-bold hidden"></p>
                            </div>
                        </div>

                        <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] overflow-hidden">
                            <div class="h-[3px] bg-[#e31b4a] w-full"></div>
                            <div class="p-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex items-center gap-3">
                                <div class="w-7 h-7 bg-[#fff0f3] text-[#e31b4a] border border-[#fecaca] rounded-sm flex items-center justify-center">
                                    <i class="fa-solid fa-key text-[11px]"></i>
                                </div>
                                <h3 class="text-[12px] font-bold text-[#0d1f35] uppercase tracking-widest">Change PIN</h3>
                            </div>
                            <div class="p-6 space-y-4">
                                <div>
                                    <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Current PIN</label>
                                    <input type="password" id="currentPin" placeholder="Your current login PIN" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] font-mono tracking-widest outline-none focus:border-[#e31b4a] transition">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">New PIN</label>
                                        <input type="password" id="newPin" placeholder="Min. 6 chars" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] font-mono tracking-widest outline-none focus:border-[#e31b4a] transition">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Confirm New</label>
                                        <input type="password" id="confirmPin" placeholder="Type it again" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] font-mono tracking-widest outline-none focus:border-[#e31b4a] transition">
                                    </div>
                                </div>
                                <div class="pt-2">
                                    <button id="savePinBtn" class="w-full bg-[#f8fafb] border border-[#dce3ed] hover:border-[#e31b4a] text-[#e31b4a] font-bold py-2.5 rounded-sm transition text-[12px] uppercase tracking-widest">
                                        Update PIN
                                    </button>
                                </div>
                                <p id="pinMsg" class="text-[12px] font-bold hidden p-2.5 rounded-sm"></p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-sm shadow-sm border border-[#0d1f35] overflow-hidden flex flex-col h-full ring-4 ring-[#0d1f35]/5">
                        <div class="h-[4px] bg-[#0ea871] w-full"></div>
                        <div class="p-6 border-b border-[#f0f4f8] bg-[#0d1f35] text-white">
                            <h3 class="text-[14px] font-bold uppercase tracking-widest mb-1"><i class="fa-solid fa-calculator mr-2 text-[#0ea871]"></i> Gradebook Config</h3>
                            <p class="text-[11px] text-[#9ab0c6] font-medium">Define assignment types and calculation weights.</p>
                        </div>
                        
                        <div class="p-6 flex-1 flex flex-col bg-[#f8fafb]">
                            <div class="bg-white p-4 border border-[#dce3ed] rounded-sm shadow-sm mb-6">
                                <label class="block text-[10px] font-bold text-[#0ea871] uppercase tracking-widest mb-3">Add Assessment Metric</label>
                                <div class="flex gap-2">
                                    <div class="flex-1">
                                        <select id="gtSelect" class="w-full p-2.5 bg-[#f4f7fb] border border-[#dce3ed] rounded-sm text-[12px] outline-none focus:border-[#0ea871]">
                                            <option value="">Select type...</option>
                                            <option value="Test">Test</option>
                                            <option value="Quiz">Quiz</option>
                                            <option value="Homework">Homework</option>
                                            <option value="Assignment">Assignment</option>
                                            <option value="Project">Project</option>
                                            <option value="Midterm Exam">Midterm Exam</option>
                                            <option value="Final Exam">Final Exam</option>
                                            <option value="Custom">-- Custom Type --</option>
                                        </select>
                                    </div>
                                    <div class="w-20">
                                        <div class="relative">
                                            <input type="number" id="gtWeight" placeholder="Wt" class="w-full p-2.5 bg-[#f4f7fb] border border-[#dce3ed] rounded-sm text-[12px] font-mono pr-6 outline-none focus:border-[#0ea871]">
                                            <span class="absolute right-2 top-2.5 text-[10px] text-[#9ab0c6] font-black">%</span>
                                        </div>
                                    </div>
                                    <button id="addGradeTypeBtn" class="bg-[#0ea871] hover:bg-[#044a30] text-white px-4 rounded-sm text-[12px] font-bold transition"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <input type="text" id="gtCustomName" placeholder="Enter custom name..." class="w-full p-2.5 mt-2 bg-[#f4f7fb] border border-[#dce3ed] rounded-sm text-[12px] outline-none focus:border-[#0ea871] hidden">
                            </div>

                            <div class="flex-1">
                                <div class="flex justify-between items-end mb-3">
                                    <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest">Active Metrics</label>
                                    <span id="gtTotalWeight" class="text-[12px] font-black text-[#0ea871] uppercase tracking-widest">Total Weight: 0%</span>
                                </div>
                                <div id="gradeTypesList" class="space-y-2 max-h-[350px] overflow-y-auto pr-1">
                                    </div>
                            </div>

                            <div id="gtMsg" class="hidden mt-4"></div>
                        </div>

                        <div class="p-6 bg-white border-t border-[#f0f4f8]">
                            <button id="saveGradeTypesBtn" class="w-full bg-[#0d1f35] hover:bg-[#0ea871] text-white font-bold py-3 rounded-sm transition text-[13px] uppercase tracking-widest">
                                <i class="fa-solid fa-floppy-disk mr-2"></i> Save Configuration
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-sm shadow-sm border border-[#dce3ed] overflow-hidden h-fit">
                        <div class="h-[3px] bg-[#f59e0b] w-full"></div>
                        <div class="p-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex items-center gap-3">
                            <div class="w-7 h-7 bg-[#fffbeb] text-[#d97706] border border-[#fde68a] rounded-sm flex items-center justify-center">
                                <i class="fa-solid fa-shield-halved text-[11px]"></i>
                            </div>
                            <div>
                                <h3 class="text-[12px] font-bold text-[#0d1f35] uppercase tracking-widest">Security Questions</h3>
                            </div>
                            <span id="secQBadge" class="ml-auto text-[10px] font-black px-2.5 py-1 rounded-sm uppercase tracking-wider bg-amber-100 text-amber-700 border border-amber-200">
                                Loading...
                            </span>
                        </div>
                        <div class="p-6 space-y-4">
                            <p class="text-[12px] text-[#6b84a0] font-semibold bg-[#f8fafb] border border-[#dce3ed] rounded-sm p-3">
                                <i class="fa-solid fa-circle-info text-[#9ab0c6] mr-2"></i>
                                Changing your security questions requires your current PIN to confirm your identity.
                            </p>

                            <div>
                                <label class="block text-[10px] font-bold text-[#6b84a0] uppercase tracking-widest mb-1.5">Verify Identity (Current PIN)</label>
                                <input type="password" id="secQCurrentPin" placeholder="Enter your current PIN"
                                    class="w-full p-2.5 bg-[#fffbeb] border border-[#fde68a] rounded-sm text-[13px] font-mono tracking-widest outline-none focus:border-[#f59e0b] transition">
                            </div>

                            <div class="pt-2">
                                <label class="block text-[10px] font-bold text-[#0d1f35] uppercase tracking-widest mb-1.5">Security Question 1 *</label>
                                <select id="secQ1" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[12px] mb-2 outline-none focus:border-[#f59e0b] transition">
                                    <option value="">Select a question...</option>
                                    <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                                    <option value="What city were you born in?">What city were you born in?</option>
                                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                                    <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                                    <option value="What is the name of the street you grew up on?">What is the name of the street you grew up on?</option>
                                    <option value="What was your childhood nickname?">What was your childhood nickname?</option>
                                    <option value="What is your oldest sibling's middle name?">What is your oldest sibling's middle name?</option>
                                    <option value="What was the make of your first car?">What was the make of your first car?</option>
                                    <option value="In what village or town did your parents meet?">In what village or town did your parents meet?</option>
                                    <option value="What is the name of your favourite teacher?">What is the name of your favourite teacher?</option>
                                </select>
                                <input type="text" id="secA1" placeholder="Your answer (not case-sensitive)"
                                    class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition">
                            </div>

                            <div class="pt-2 border-t border-[#f0f4f8]">
                                <label class="block text-[10px] font-bold text-[#0d1f35] uppercase tracking-widest mb-1.5">Security Question 2 *</label>
                                <select id="secQ2" class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[12px] mb-2 outline-none focus:border-[#f59e0b] transition">
                                    <option value="">Select a question...</option>
                                    <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                                    <option value="What city were you born in?">What city were you born in?</option>
                                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                                    <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                                    <option value="What is the name of the street you grew up on?">What is the name of the street you grew up on?</option>
                                    <option value="What was your childhood nickname?">What was your childhood nickname?</option>
                                    <option value="What is your oldest sibling's middle name?">What is your oldest sibling's middle name?</option>
                                    <option value="What was the make of your first car?">What was the make of your first car?</option>
                                    <option value="In what village or town did your parents meet?">In what village or town did your parents meet?</option>
                                    <option value="What is the name of your favourite teacher?">What is the name of your favourite teacher?</option>
                                </select>
                                <input type="text" id="secA2" placeholder="Your answer (not case-sensitive)"
                                    class="w-full p-2.5 bg-[#f8fafb] border border-[#dce3ed] rounded-sm text-[13px] outline-none focus:border-[#f59e0b] transition">
                            </div>

                            <div class="pt-2">
                                <button id="saveSecQBtn" class="w-full bg-[#f8fafb] border border-[#dce3ed] hover:border-[#f59e0b] text-[#d97706] font-bold py-2.5 rounded-sm transition text-[12px] uppercase tracking-widest">
                                    Save Security Questions
                                </button>
                            </div>
                            <p id="secQMsg" class="text-[12px] font-bold hidden p-2.5 rounded-sm"></p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script type="module" src="settings.js"></script>
</body>
</html>
