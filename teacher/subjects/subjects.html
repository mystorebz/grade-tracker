<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects | Teacher Portal | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/teachers.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f0fdf8]">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden">
        
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-7 view-section">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex flex-wrap gap-4 justify-between items-center bg-gradient-to-r from-white to-teal-50/30">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-teal-100 text-teal-600 rounded-xl flex items-center justify-center text-lg"><i class="fa-solid fa-layer-group"></i></div>
                        <div>
                            <h3 class="font-black text-xl text-slate-800">Subjects Overview</h3>
                            <p class="text-sm text-slate-400 font-semibold">Performance by subject for the active period</p>
                        </div>
                    </div>
                    <button onclick="openSubjectFormModal()" class="flex items-center gap-2 bg-teal-600 hover:bg-teal-700 text-white font-black px-5 py-2.5 rounded-xl text-sm shadow-md shadow-teal-500/20 transition">
                        <i class="fa-solid fa-plus"></i> Add Subject
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-800 text-slate-200 text-xs uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4 font-black">Subject</th>
                                <th class="px-6 py-4 font-black text-center">Students</th>
                                <th class="px-6 py-4 font-black text-center">Assignments</th>
                                <th class="px-6 py-4 font-black text-center">Class Avg</th>
                                <th class="px-6 py-4 font-black text-center">Highest</th>
                                <th class="px-6 py-4 font-black text-center">Lowest</th>
                                <th class="px-6 py-4 font-black text-center">At Risk</th>
                                <th class="px-6 py-4 font-black">Last Graded</th>
                                <th class="px-6 py-4 font-black text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="subjectsTableBody" class="divide-y divide-slate-100">
                            <tr><td colspan="9" class="px-6 py-16 text-center text-slate-400 font-semibold"><i class="fa-solid fa-spinner fa-spin text-teal-400 text-2xl mb-3 block"></i>Loading subjects...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="subjectPanel" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-end hidden opacity-0">
        <div id="subjectPanelInner" class="side-panel bg-[#f0fdf8] w-full max-w-3xl h-full shadow-2xl flex flex-col translate-x-full">
            <div class="h-1 bg-gradient-to-r from-teal-500 via-emerald-400 to-cyan-500 flex-shrink-0"></div>
            
            <div class="px-7 py-5 border-b border-slate-200 bg-white flex justify-between items-center flex-shrink-0 flex-wrap gap-3">
                <div>
                    <h3 id="spPanelTitle" class="font-black text-2xl text-slate-800">Subject</h3>
                    <p id="spPanelMeta" class="text-sm text-teal-600 font-bold mt-0.5">Subject details</p>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    <button onclick="printSubjectReport()" class="no-print flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-black px-4 py-2 rounded-xl text-sm transition border border-slate-200"><i class="fa-solid fa-print"></i> Print Report</button>
                    <button id="spQuickGradeBtn" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-black px-4 py-2 rounded-xl text-sm transition shadow-md"><i class="fa-solid fa-plus"></i> Enter Grade</button>
                    <button onclick="closeSubjectPanel()" class="text-slate-400 hover:text-red-500 h-9 w-9 rounded-full flex items-center justify-center hover:bg-red-50 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
            </div>

            <div class="px-7 py-4 bg-slate-50 border-b border-slate-200 flex flex-col gap-3 shadow-sm flex-shrink-0">
                <div class="flex gap-3 flex-wrap">
                    <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-2 py-1.5 flex-1 min-w-[140px]">
                        <i class="fa-solid fa-chalkboard text-slate-400 text-xs"></i>
                        <select id="spFilterClass" onchange="renderSubjectPanelData()" class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer w-full"><option value="">All Classes</option></select>
                    </div>
                    <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-2 py-1.5 flex-1 min-w-[140px]">
                        <i class="fa-solid fa-user text-slate-400 text-xs"></i>
                        <select id="spFilterStudent" onchange="renderSubjectPanelData()" class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer w-full"><option value="">All Students</option></select>
                    </div>
                    <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-2 py-1.5 flex-1 min-w-[140px]">
                        <i class="fa-solid fa-chart-line text-slate-400 text-xs"></i>
                        <select id="spFilterStanding" onchange="renderSubjectPanelData()" class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer w-full">
                            <option value="">All Standings</option>
                            <option value="excelling">Excelling (90-100)</option>
                            <option value="good">Good Standing (80-89)</option>
                            <option value="ontrack">On Track (70-79)</option>
                            <option value="needsattention">Needs Attention (65-69)</option>
                            <option value="atrisk">At Risk (&lt;65)</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 flex-wrap">
                    <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-2 py-1.5 flex-1 min-w-[140px]">
                        <i class="fa-solid fa-tag text-slate-400 text-xs"></i>
                        <select id="spFilterType" onchange="renderSubjectPanelData()" class="bg-transparent text-xs font-bold text-slate-700 outline-none cursor-pointer w-full"><option value="">All Types</option></select>
                    </div>
                    <div class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-2 py-1.5 flex-1 min-w-[140px]">
                        <i class="fa-solid fa-magnifying-glass text-slate-400 text-xs"></i>
                        <input type="text" id="spSearchTitle" oninput="renderSubjectPanelData()" placeholder="Search assignments..." class="bg-transparent text-xs font-bold text-slate-700 outline-none w-full placeholder-slate-400">
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-7 space-y-6" id="subjectPanelBody">
                <div class="flex justify-center py-16"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-teal-500"></i></div>
            </div>
        </div>
    </div>

    <div id="subjectFormModal" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full m-4 overflow-hidden transform scale-95 transition-transform duration-200" id="subjectFormModalInner">
            <div class="h-1 bg-gradient-to-r from-teal-500 to-cyan-400"></div>
            <div class="px-7 py-5 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-teal-100 text-teal-600 rounded-xl flex items-center justify-center"><i id="subjectFormIcon" class="fa-solid fa-layer-group"></i></div>
                    <h3 id="subjectFormTitle" class="font-black text-xl text-slate-800">Add Subject</h3>
                </div>
                <button onclick="closeSubjectFormModal()" class="text-slate-400 hover:text-red-500 h-8 w-8 rounded-full flex items-center justify-center hover:bg-red-50 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-7 space-y-4 bg-slate-50/50">
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1.5">Subject Name *</label>
                    <input type="text" id="subjectFormName" placeholder="e.g. Physical Education" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-wider mb-1.5">Description <span class="normal-case font-semibold text-slate-400">(optional)</span></label>
                    <textarea id="subjectFormDesc" placeholder="e.g. Primary math curriculum" class="form-input w-full p-3 bg-white border border-slate-200 rounded-xl text-sm h-20 resize-none"></textarea>
                </div>
                <button id="saveSubjectFormBtn" class="w-full bg-gradient-to-r from-teal-600 to-teal-700 text-white font-black py-3.5 rounded-xl transition shadow-md text-base">Save Subject</button>
                <p id="subjectFormMsg" class="text-sm hidden font-bold p-3 rounded-xl text-center"></p>
            </div>
        </div>
    </div>

    <div id="assignmentModal" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full m-4 overflow-hidden transform scale-95 transition-transform duration-200" id="assignmentModalInner">
            <div class="h-1 bg-gradient-to-r from-emerald-500 to-teal-400"></div>
            <div class="px-7 py-5 border-b border-slate-100 flex justify-between items-center">
                <h3 id="aModalTitle" class="font-black text-xl text-slate-800">Assignment Detail</h3>
                <button onclick="closeAssignmentModal()" class="text-slate-400 hover:text-red-500 h-8 w-8 rounded-full flex items-center justify-center hover:bg-red-50 transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-7" id="aModalBody"></div>
        </div>
    </div>

    <script type="module" src="subjects.js"></script>
</body>
</html>
