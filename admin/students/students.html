<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registry | Admin Portal | ConnectUs</title>
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .panel-tab {
            padding: 12px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.07em; color: #6b84a0; border-bottom: 3px solid transparent;
            cursor: pointer; transition: color 0.15s, border-color 0.15s;
        }
        .panel-tab.active { color: #2563eb; border-bottom-color: #2563eb; }
        .subject-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .subject-body.open { max-height: 2000px; }
    </style>
</head>
<body class="flex w-full h-screen overflow-hidden bg-[#f4f7fb] font-['DM_Sans']">

    <div id="layout-sidebar-container" class="flex-shrink-0 h-full z-20"></div>

    <main id="dashboardMain" class="flex-1 flex flex-col h-full overflow-hidden min-w-0">
        <div id="layout-topbar-container" class="flex-shrink-0 z-10"></div>

        <div class="flex-1 overflow-y-auto p-8 view-section">
            <div class="w-full space-y-6">

                <div class="flex justify-end mb-4 border-b-2 border-[#0d1f35] pb-4">
                    <div class="flex gap-3">
                        <button id="exportCsvBtn" class="flex items-center gap-2 bg-white hover:bg-[#f8fafb] text-[#374f6b] font-bold px-4 py-2.5 rounded shadow-sm border border-[#c5d0db] transition text-[12px]">
                            <i class="fa-solid fa-file-csv"></i> Export Data
                        </button>
                        <button id="printListBtn" class="flex items-center gap-2 bg-white hover:bg-[#f8fafb] text-[#374f6b] font-bold px-4 py-2.5 rounded shadow-sm border border-[#c5d0db] transition text-[12px]">
                            <i class="fa-solid fa-print"></i> Print Directory
                        </button>
                    </div>
                </div>

                <div class="flex gap-3 flex-wrap">
                    <div class="flex items-center bg-white border border-[#dce3ed] rounded-lg overflow-hidden min-w-[240px]">
                        <i class="fa-solid fa-magnifying-glass px-3 text-[#9ab0c6] bg-[#f8fafb] h-full flex items-center border-r border-[#e8edf2]"></i>
                        <input type="text" id="searchInput" placeholder="Search students..." class="w-full p-2.5 text-[12.5px] outline-none text-[#0d1f35] font-semibold">
                    </div>
                    <select id="filterStudentClass" class="p-2.5 text-[12px] bg-white rounded-lg border border-[#dce3ed] outline-none text-[#374f6b] font-semibold">
                        <option value="">All Classes</option>
                        <option value="unassigned">Unassigned Only</option>
                    </select>
                    <select id="filterStudentTeacher" class="p-2.5 text-[12px] bg-white rounded-lg border border-[#dce3ed] outline-none text-[#374f6b] font-semibold">
                        <option value="">All Teachers</option>
                    </select>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-[#dce3ed] overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[13px] text-[#374f6b]">
                            <thead class="bg-[#f8fafb] text-[#6b84a0] text-[10px] uppercase tracking-widest font-bold border-b-2 border-[#dce3ed]">
                                <tr>
                                    <th class="px-6 py-4">Student Identity</th>
                                    <th class="px-6 py-4">Class</th>
                                    <th class="px-6 py-4">Assigned Teacher</th>
                                    <th class="px-6 py-4">Parent Phone</th>
                                    <th class="px-6 py-4 text-right">Records</th>
                                </tr>
                            </thead>
                            <tbody id="studentsTableBody" class="divide-y divide-[#f0f4f8]">
                                <tr><td colspan="5" class="px-6 py-16 text-center text-[#9ab0c6] italic font-semibold">
                                    <i class="fa-solid fa-spinner fa-spin mr-2 text-[#2563eb]"></i>Loading student records...
                                </td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="studentPanel" class="overlay fixed inset-0 bg-[#0d1f35]/60 backdrop-blur-sm z-40 flex justify-end hidden opacity-0 transition-opacity">
        <div id="studentPanelInner" class="bg-white w-full max-w-4xl h-full shadow-2xl flex flex-col translate-x-full transition-transform">
            <div class="h-1 bg-[#2563eb] flex-shrink-0"></div>

            <div class="px-7 py-4 border-b border-[#f0f4f8] bg-[#f8fafb] flex-shrink-0">
                <div class="flex items-center justify-between gap-4">
                    <div class="min-w-0 flex-1">
                        <h3 id="sPanelName" class="font-bold text-xl text-[#0d1f35] truncate">Loading...</h3>
                        <p id="sPanelId" class="font-mono text-[11px] text-[#6b84a0] font-bold mt-0.5">—</p>
                    </div>
                    
                    <div class="flex items-center justify-end gap-3 flex-1">
                        <div class="relative">
                            <button onclick="window.toggleSEnrollDropdown()" class="flex items-center gap-2 bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold px-4 py-2 rounded-lg text-[12px] border border-amber-200 transition">
                                <i class="fa-solid fa-gear"></i> Manage Identity
                            </button>
                            <div id="sEnrollDropdown" class="hidden absolute right-0 top-full mt-1 bg-white rounded-lg shadow-xl border border-[#dce3ed] z-50 w-48 overflow-hidden">
                                <button onclick="window.openReassignModal()" class="w-full text-left px-4 py-3 text-[12px] font-bold text-blue-700 hover:bg-blue-50 transition border-b border-[#f0f4f8]">
                                    <i class="fa-solid fa-people-arrows mr-2"></i> Reassign Class
                                </button>
                                <button onclick="window.openArchiveReasonModal()" class="w-full text-left px-4 py-3 text-[12px] font-bold text-amber-600 hover:bg-amber-50 transition">
                                    <i class="fa-solid fa-box-archive mr-2"></i> Archive / Transfer
                                </button>
                            </div>
                        </div>
                        <button onclick="window.printStudentRecord()" class="flex items-center gap-2 bg-white hover:bg-slate-50 text-slate-700 font-bold px-4 py-2 rounded-lg text-[12px] border border-slate-200 transition">
                            <i class="fa-solid fa-print"></i> Print
                        </button>
                        <button onclick="window.closeStudentPanel()" class="text-[#9ab0c6] hover:text-[#e31b4a] h-9 w-9 rounded-full flex items-center justify-center transition ml-2">
                            <i class="fa-solid fa-xmark text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex-shrink-0 border-b-2 border-[#f0f4f8] bg-white overflow-x-auto px-4">
                <div class="flex">
                    <button class="panel-tab active" data-tab="overview" onclick="window.switchStudentTab('overview')"><i class="fa-solid fa-id-card mr-1.5"></i>Overview</button>
                    <button class="panel-tab" data-tab="academic" onclick="window.switchStudentTab('academic')"><i class="fa-solid fa-graduation-cap mr-1.5"></i>Academic Records</button>
                    <button class="panel-tab" data-tab="history" onclick="window.switchStudentTab('history')"><i class="fa-solid fa-clock-rotate-left mr-1.5"></i>Passport History</button>
                </div>
            </div>

            <div id="sPanelLoader" class="flex-1 flex flex-col items-center justify-center hidden">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 text-blue-500"></i>
                <p class="font-semibold text-sm text-slate-500">Loading passport...</p>
            </div>

            <div id="tab-overview" class="tab-pane flex-1 overflow-y-auto p-6 bg-[#f4f7fb]">
                <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Identity Details</h4>
                    <div id="sInfoGrid" class="space-y-3"></div>
                </div>
            </div>

            <div id="tab-academic" class="tab-pane hidden flex-1 overflow-y-auto p-6 bg-[#f4f7fb]">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest">Grades at this School</h4>
                    <button onclick="window.openAdminAddGradeModal()" class="text-xs font-bold bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-100 transition">
                        <i class="fa-solid fa-plus mr-1"></i> Admin Grade Override
                    </button>
                </div>
                <div id="subjectAccordions" class="space-y-4"></div>
            </div>

            <div id="tab-history" class="tab-pane hidden flex-1 overflow-y-auto p-6 bg-[#f4f7fb]">
                <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Global Transfer Logs</h4>
                <div id="historyLogsContainer" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="reassignStudentModal" class="overlay fixed inset-0 bg-[#0d1f35]/60 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full m-4 overflow-hidden" id="reassignStudentModalInner">
            <div class="px-6 py-4 border-b border-[#f0f4f8] bg-blue-50 flex justify-between items-center">
                <h3 class="font-bold text-blue-800">Reassign Student</h3>
                <button onclick="window.closeReassignModal()"><i class="fa-solid fa-xmark text-slate-400 hover:text-red-500"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Class</label>
                    <select id="rsClass" class="w-full p-2.5 border border-slate-300 rounded-lg text-sm"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Teacher</label>
                    <select id="rsTeacher" class="w-full p-2.5 border border-slate-300 rounded-lg text-sm"></select>
                </div>
                <p id="reassignMsg" class="text-xs font-bold text-red-500 hidden"></p>
                <button id="saveReassignBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition text-sm">Save Assignment</button>
            </div>
        </div>
    </div>

    <div id="archiveReasonModal" class="overlay fixed inset-0 bg-[#0d1f35]/60 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl max-w-sm w-full m-4 overflow-hidden" id="archiveReasonModalInner">
            <div class="px-6 py-4 border-b border-[#f0f4f8] bg-amber-50 flex justify-between items-center">
                <h3 class="font-bold text-amber-800">Archive / Transfer</h3>
                <button onclick="window.closeArchiveReasonModal()"><i class="fa-solid fa-xmark text-slate-400 hover:text-red-500"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <p class="text-sm text-slate-600 font-medium">Why is this student leaving the active roster?</p>
                <select id="archiveReasonSelect" class="w-full p-2.5 border border-slate-300 rounded-lg text-sm">
                    <option value="Transferred to another school">Transferred to another school</option>
                    <option value="Graduated">Graduated</option>
                    <option value="Expelled">Expelled</option>
                    <option value="Dropped Out">Dropped Out</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="archiveReasonOther" placeholder="Specify reason..." class="w-full p-2.5 border border-slate-300 rounded-lg text-sm hidden">
                <button id="confirmArchiveBtn" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 rounded-lg transition text-sm">Confirm & Archive</button>
            </div>
        </div>
    </div>

    <div id="adminAddGradeModal" class="overlay fixed inset-0 bg-[#0d1f35]/60 backdrop-blur-sm z-[80] flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full m-4 overflow-hidden" id="adminAddGradeModalInner">
            <div class="px-6 py-4 border-b border-[#f0f4f8] flex justify-between items-center bg-blue-50">
                <h3 class="font-bold text-lg text-blue-900">Admin Grade Override</h3>
                <button onclick="window.closeAdminAddGradeModal()"><i class="fa-solid fa-xmark text-slate-400 hover:text-red-500"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Subject</label>
                        <input type="text" id="agAddSubject" placeholder="e.g. Math" class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Type</label>
                        <input type="text" id="agAddType" placeholder="e.g. Final Exam" class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Title</label>
                    <input type="text" id="agAddTitle" placeholder="e.g. Administrative Placement Test" class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none">
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Score</label>
                        <input type="number" id="agAddScore" class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Out Of</label>
                        <input type="number" id="agAddMax" value="100" class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Date</label>
                        <input type="date" id="agAddDate" class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Admin Notes (Mandatory for Override)</label>
                    <textarea id="agAddNotes" placeholder="Reason for admin entry..." class="w-full p-2.5 border border-slate-300 rounded text-sm outline-none resize-none h-16"></textarea>
                </div>
                <button id="saveAdminAddGradeBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition text-sm">Save Official Grade</button>
            </div>
        </div>
    </div>

    <script type="module" src="students.js"></script>
</body>
</html>
