<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Team | ConnectUs HQ</title>
    
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png">
    
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-300 font-sans antialiased min-h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col h-screen flex-shrink-0 relative z-20">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-emerald-400 to-teal-600"></div>
        <div class="h-20 flex flex-row items-center gap-3 px-6 border-b border-slate-800/50">
            <img src="../../assets/images/logo.png" alt="ConnectUs" class="h-8 w-auto drop-shadow-md">
            <div>
                <h1 class="text-xl font-black text-white tracking-widest uppercase leading-none">ConnectUs <span class="text-emerald-400">HQ</span></h1>
                <p id="hqAdminBadge" class="text-[9px] font-mono font-bold text-emerald-500 tracking-widest uppercase mt-0.5">Role: Owner</p>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
            <a href="../index.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> Overview
            </a>
            <a href="../approvals/approvals.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i> Approvals & Quotes
            </a>
            <a href="../schools/schools.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-school w-5 text-center"></i> School Directory
            </a>
            <a href="../organizations/organizations.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-sitemap w-5 text-center"></i> Organizations
            </a>
            <div class="pt-6 pb-2"><p class="px-4 text-[10px] font-black text-slate-600 uppercase tracking-widest">Platform Settings</p></div>
            <a href="team.html" id="navTeamBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition text-emerald-400 bg-emerald-900/20 border border-emerald-800/30">
                <i class="fa-solid fa-user-shield w-5 text-center"></i> HQ Team
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <div class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center justify-between">
                <div class="overflow-hidden">
                    <p id="hqAdminName" class="text-xs font-bold text-white leading-tight truncate">Admin</p>
                    <p id="hqAdminId" class="text-[10px] text-slate-500 font-mono mt-0.5">HQ-XXXXX</p>
                </div>
                <button id="logoutBtn" class="text-slate-400 hover:text-red-400 transition ml-2" title="Logout"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#0f172a] relative z-10">
        <header class="h-20 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md flex-shrink-0">
            <div>
                <h2 class="text-xl font-black text-white tracking-wide">HQ Team</h2>
                <p class="text-xs text-slate-400 font-semibold mt-1">Manage platform support staff and permissions.</p>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-xl">
                <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-900/50">
                    <h3 class="font-black text-white text-lg">HQ Team Roster</h3>
                    <button onclick="window.openAddTeamModal()" class="text-xs font-bold text-white bg-teal-600 hover:bg-teal-500 transition px-4 py-2 rounded-lg shadow-md border border-teal-500">
                        <i class="fa-solid fa-user-plus mr-1"></i> Add Member
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900/80 text-[10px] uppercase tracking-widest text-slate-500 border-b border-slate-700">
                                <th class="p-4 font-black">Staff Member</th>
                                <th class="p-4 font-black">Email</th>
                                <th class="p-4 font-black">Role</th>
                                <th class="p-4 font-black">Status</th>
                                <th class="p-4 font-black text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="teamTableBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="addTeamModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[60] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 max-w-sm w-full m-4 transform scale-95 transition-transform duration-300 overflow-hidden" id="addTeamModalInner">
            <div class="h-1.5 bg-gradient-to-r from-teal-500 to-teal-400"></div>
            <div class="p-8">
                <h3 class="font-black text-xl text-white mb-6">Add Team Member</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Name</label>
                        <input type="text" id="teamName" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white focus:border-teal-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Email</label>
                        <input type="email" id="teamEmail" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white focus:border-teal-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Initial PIN</label>
                        <input type="password" id="teamPin" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white focus:border-teal-500 transition outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5">Role</label>
                        <select id="teamRole" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white focus:border-teal-500 transition outline-none">
                            <option value="Support">Support</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                </div>
                <p id="teamErrorMsg" class="text-xs text-red-400 font-bold mt-4 hidden"></p>
                <div class="flex gap-3 mt-6">
                    <button onclick="window.closeAddTeamModal()" class="flex-1 py-3 text-slate-400 font-bold text-sm hover:text-white transition">Cancel</button>
                    <button id="saveTeamBtn" class="flex-1 bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-xl transition">Add Member</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="hq-team.js"></script>
</body>
</html>
