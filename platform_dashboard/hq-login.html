<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Login | ConnectUs</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900 antialiased">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-white tracking-widest uppercase">ConnectUs <span class="text-emerald-400">HQ</span></h1>
            <p class="text-slate-500 font-bold mt-2 text-xs tracking-widest uppercase">Restricted Access</p>
        </div>

        <div class="bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden relative p-8">
            <div class="absolute top-0 left-0 right-0 h-1 bg-slate-700">
                <div class="h-full bg-emerald-400 shadow-[0_0_10px_#34d399] w-1/3 animate-pulse mx-auto"></div>
            </div>
            
            <div class="space-y-5 mt-2">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Authorization ID</label>
                    <div class="relative">
                        <i class="fa-solid fa-fingerprint absolute left-4 top-3.5 text-slate-500"></i>
                        <input type="text" id="loginId" placeholder="HQ-XXXXX" class="w-full pl-11 p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white font-mono font-bold outline-none focus:border-emerald-500 transition uppercase">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Security PIN</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-500"></i>
                        <input type="password" id="loginPin" placeholder="••••••••" class="w-full pl-11 p-3 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white outline-none focus:border-emerald-500 transition">
                    </div>
                </div>
            </div>

            <p id="loginErrorMsg" class="text-xs font-bold text-red-400 bg-red-900/30 border border-red-800/50 p-3 rounded-lg text-center hidden mt-5"></p>

            <button id="authBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl transition shadow-lg shadow-emerald-900/50 text-sm tracking-wide mt-6">
                Authenticate →
            </button>
        </div>
    </div>

    <script type="module" src="hq-login.js"></script>
</body>
</html>
