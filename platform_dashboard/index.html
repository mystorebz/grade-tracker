<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Dashboard | ConnectUs</title>
    
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-300 font-sans antialiased min-h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col h-screen flex-shrink-0 relative z-20">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-emerald-400 to-teal-600"></div>
        
        <div class="h-20 flex flex-row items-center gap-3 px-6 border-b border-slate-800/50">
            <img src="../assets/images/logo.png" alt="ConnectUs" class="h-8 w-auto drop-shadow-md">
            <div>
                <h1 class="text-xl font-black text-white tracking-widest uppercase leading-none">ConnectUs <span class="text-emerald-400">HQ</span></h1>
                <p id="hqAdminBadge" class="text-[9px] font-mono font-bold text-emerald-500 tracking-widest uppercase mt-0.5">Role: Owner</p>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1" id="hqNav">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition text-emerald-400 bg-emerald-900/20 border border-emerald-800/30">
                <i class="fa-solid fa-chart-line w-5 text-center"></i> Overview
            </a>
            <a href="approvals/approvals.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-file-invoice-dollar w-5 text-center"></i> Approvals & Quotes
            </a>
            <a href="schools/schools.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-school w-5 text-center"></i> School Directory
            </a>
            <a href="organizations/organizations.html" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-sitemap w-5 text-center"></i> Organizations
            </a>
            
            <div class="pt-6 pb-2">
                <p class="px-4 text-[10px] font-black text-slate-600 uppercase tracking-widest">Platform Settings</p>
            </div>
            
            <a href="team/team.html" id="navTeamBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-slate-400 hover:text-white hover:bg-slate-800 transition">
                <i class="fa-solid fa-user-shield w-5 text-center"></i> HQ Team
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <div class="bg-slate-900 border border-slate-700 rounded-xl p-3 flex items-center justify-between">
                <div class="overflow-hidden">
                    <p id="hqAdminName" class="text-xs font-bold text-white leading-tight truncate">Admin</p>
                    <p id="hqAdminId" class="text-[10px] text-slate-500 font-mono mt-0.5">HQ-XXXXX</p>
                </div>
                <button id="logoutBtn" class="text-slate-400 hover:text-red-400 transition ml-2" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#0f172a] relative z-10">
        
        <header class="h-20 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md flex-shrink-0">
            <div>
                <h2 id="pageTitle" class="text-xl font-black text-white tracking-wide">Overview</h2>
                <p id="pageSubtitle" class="text-xs text-slate-400 font-semibold mt-1">Platform metrics and system health.</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="flex h-3 w-3 relative" title="System Online">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">All Systems Operational</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8" id="mainContent">
            <div id="view-overview" class="view-section">
                <div class="grid grid-cols-4 gap-6 mb-8">
                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl">
                        <i class="fa-solid fa-school text-emerald-400 text-2xl mb-3"></i>
                        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-1">Active Schools</p>
                        <p id="metricSchools" class="text-3xl font-black text-white"><i class="fa-solid fa-circle-notch fa-spin text-lg text-slate-600"></i></p>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl">
                        <i class="fa-solid fa-chalkboard-user text-blue-400 text-2xl mb-3"></i>
                        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-1">Total Teachers</p>
                        <p id="metricTeachers" class="text-3xl font-black text-white"><i class="fa-solid fa-circle-notch fa-spin text-lg text-slate-600"></i></p>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl">
                        <i class="fa-solid fa-graduation-cap text-indigo-400 text-2xl mb-3"></i>
                        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-1">Total Students</p>
                        <p id="metricStudents" class="text-3xl font-black text-white"><i class="fa-solid fa-circle-notch fa-spin text-lg text-slate-600"></i></p>
                    </div>
                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl border-l-4 border-l-amber-500">
                        <i class="fa-solid fa-file-invoice-dollar text-amber-400 text-2xl mb-3"></i>
                        <p class="text-xs font-black text-slate-500 uppercase tracking-widest mb-1">Pending Quotes</p>
                        <p id="metricQuotes" class="text-3xl font-black text-amber-400"><i class="fa-solid fa-circle-notch fa-spin text-lg text-amber-600/50"></i></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="core/hq-core.js"></script>
</body>
</html>
