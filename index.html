<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectUs | Modern Educational Connections in Belize</title>
    <link rel="stylesheet" href="assets/css/global.css">
    
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans antialiased text-slate-800">

    <header class="relative bg-gradient-to-b from-blue-100 to-slate-50 pt-20 pb-20 px-4 min-h-[500px] md:min-h-[600px] flex flex-col items-center justify-center overflow-hidden">
        
        <div class="md:absolute md:-left-4 lg:left-0 md:top-1/2 md:-translate-y-1/2 w-full max-w-[250px] md:max-w-[350px] lg:max-w-[450px] mb-8 md:mb-0 z-0 flex justify-center md:justify-start pointer-events-none">
            <img src="assets/images/logo.png" alt="ConnectUs Belize Education Platform Logo" class="w-full h-auto drop-shadow-xl animate-float">
        </div>

        <div class="relative z-10 max-w-4xl mx-auto text-center bg-white/40 md:bg-transparent p-6 rounded-3xl md:p-0 backdrop-blur-sm md:backdrop-blur-none">
            
            <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-blue-950 tracking-tighter mb-6 leading-tight">
                ConnectUs: Modernizing How Parents, Teachers, and Students Engage in Belize
            </h1>
            
            <div class="space-y-4 max-w-3xl mx-auto">
                <p class="text-xl md:text-2xl font-semibold text-slate-800 leading-relaxed">
                    Seamless communication. Replacing paperwork with real-time insights.
                </p>
                <p class="text-xl md:text-2xl font-medium text-slate-700 leading-relaxed">
                    Empowering every student to succeed. Trusted by schools across Belize.
                </p>
            </div>
            
            <p class="text-2xl font-bold text-slate-900 mt-14">Get started today on transforming your school...</p>
            
        </div>
    </header>

    </body>
</html>
