<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscribe - ConnectUs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex flex-col items-center py-12">

    <div class="text-center max-w-2xl mx-auto mb-12 px-4">
        <h1 class="text-4xl font-black text-white mb-4">Choose Your Plan</h1>
        <p class="text-slate-400">Simple, transparent pricing to upgrade your school's management.</p>
    </div>

    <div id="pricingCardsContainer" class="flex flex-wrap justify-center gap-8 max-w-6xl px-4">
        <div class="text-center text-blue-400 text-xl w-full">
            <i class="fa-solid fa-spinner fa-spin"></i> Loading plans...
        </div>
    </div>

    <div id="subscribeModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4 transition-opacity opacity-0 duration-300">
        <div id="subscribeModalInner" class="bg-slate-800 rounded-xl shadow-2xl border border-slate-700 w-full max-w-md p-6 transform scale-95 transition-transform duration-300">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white">Subscribe to <span id="modalPlanName" class="text-blue-400">Plan</span></h2>
                <button id="closeModalBtn" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <form id="subscribeForm" class="space-y-4">
                <input type="hidden" id="selectedPlanId">
                <input type="hidden" id="selectedStripeUrl">

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">First Name</label>
                        <input type="text" id="subFirstName" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:border-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Last Name</label>
                        <input type="text" id="subLastName" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:border-blue-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">School / Institution Name</label>
                    <input type="text" id="subSchoolName" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:border-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Work Email</label>
                    <input type="email" id="subEmail" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:border-blue-500 focus:outline-none">
                </div>

                <div id="modalErrorMsg" class="hidden bg-red-900/50 border border-red-500 text-red-200 text-xs p-3 rounded-lg"></div>

                <button type="submit" id="proceedToPayBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition mt-4">
                    Proceed to Payment <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="./pricing.js"></script>
</body>
</html>
